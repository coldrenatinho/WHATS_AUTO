name: whatsauto-staging

# Use como override:
# docker compose -f docker-compose.simple.yml -f docker-compose.staging.yml up -d --build

services:
  frontend:
    ports: !override
      - "${STAGING_APP_PORT:-18080}:80"
    environment:
      VITE_DEBUG_API: "true"
      VITE_DEBUG_SOCKET: "true"

  evolution:
    ports: !override
      - "${STAGING_EVOLUTION_PORT:-18082}:8080"
    environment:
      SERVER_URL: ${STAGING_EVOLUTION_PUBLIC_URL:-http://localhost:18082}

  node-exporter:
    ports: !override
      - "${STAGING_NODE_EXPORTER_PORT:-19100}:9100"

  cadvisor:
    ports: !override
      - "${STAGING_CADVISOR_PORT:-18083}:8080"
