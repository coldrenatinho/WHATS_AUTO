services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsauto_backend_local
    restart: unless-stopped
    ports:
      - "13000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-whatsauto}
      - DB_USER=${DB_USER:-whatsauto}
      - DB_PASS=${DB_PASS:-whatsauto123}
      - JWT_SECRET=${JWT_SECRET:-sua_chave_jwt_super_secreta}
      - EVOLUTION_SERVER_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-dev-evolution-key}
      - N8N_WEBHOOK_URL=http://n8n:5678
      - BUSINESS_NAME=${BUSINESS_NAME:-Norte MT Sistemas}
      - COMPANY_SUBDOMAIN=${COMPANY_SUBDOMAIN:-norte}
      - HUMAN_PHONE=${HUMAN_PHONE:-5566999999999}
      - ADMIN_NAME=${ADMIN_NAME:-Administrador}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@nortemtsistemas.com.br}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123456}
      - ADMIN_RESET_PASSWORD=${ADMIN_RESET_PASSWORD:-false}
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatsauto_frontend_local
    restart: unless-stopped
    ports:
      - "18081:80"
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_bot_local
    restart: unless-stopped
    ports:
      - "15678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin123}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:15678
      - NODE_ENV=production
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - NODE_FUNCTION_ALLOW_EXTERNAL=better-sqlite3
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - EVOLUTION_SERVER_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-dev-evolution-key}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-meu_whatsapp}
      - HUMAN_PHONE=${HUMAN_PHONE:-5566999999999}
      - BUSINESS_NAME=${BUSINESS_NAME:-Norte MT Sistemas}
      - BACKEND_URL=http://backend:3000
    volumes:
      - n8n_data:/home/node/.n8n
      - ./bot_data:/data
    depends_on:
      - backend

  evolution:
    image: atendai/evolution-api:latest
    container_name: evolution_api_local
    restart: unless-stopped
    ports:
      - "18080:8080"
    environment:
      - SERVER_URL=http://localhost:18080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-dev-evolution-key}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-botuser}:${POSTGRES_PASSWORD:-bot_senha_forte_aqui}@postgres:5432/${POSTGRES_DB:-evolution_db}
      - WEBSOCKET_ENABLED=true
      - WEBSOCKET_GLOBAL_EVENTS=true
      - WEBSOCKET_EVENTS_QRCODE_UPDATED=true
      - WEBSOCKET_EVENTS_CONNECTION_UPDATE=true
      - CACHE_REDIS_ENABLED=false
      - LOG_LEVEL=INFO
      - LOG_COLOR=true
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_SET=false
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=false
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=false
      - WEBHOOK_EVENTS_CHATS_UPSERT=false
      - WEBHOOK_EVENTS_GROUPS_UPSERT=false
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy

  mariadb:
    image: mariadb:11.4
    container_name: whatsauto_mariadb_local
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS:-root_super_secret}
      - MYSQL_DATABASE=${DB_NAME:-whatsauto}
      - MYSQL_USER=${DB_USER:-whatsauto}
      - MYSQL_PASSWORD=${DB_PASS:-whatsauto123}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mariadb", "-u${DB_USER:-whatsauto}", "-p${DB_PASS:-whatsauto123}", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:15-alpine
    container_name: postgres_bot_local
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-botuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-bot_senha_forte_aqui}
      - POSTGRES_DB=${POSTGRES_DB:-evolution_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-botuser} -d ${POSTGRES_DB:-evolution_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whatsauto_redis_local
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  n8n_data:
  evolution_data:
  postgres_data:
  mariadb_data:
  redis_data: