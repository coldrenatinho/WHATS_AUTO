# ═══════════════════════════════════════════════════════════════
# Norte MT Sistemas - Pre-Deploy Validation
# Valida componentes críticos antes de deploy
# ═══════════════════════════════════════════════════════════════

name: Pre-Deploy Validation

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Ambiente alvo'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      affected_components:
        description: 'Componentes afetados (backend,frontend,database,webhooks)'
        required: true
        default: 'backend,frontend'
      risk_level:
        description: 'Nível de risco estimado'
        required: true
        default: 'medium'
        type: choice
        options:
          - low
          - medium
          - high

env:
  NODE_VERSION: '20'

jobs:
  # ─── Backend Validation ────────────────────────────────────────
  backend-validation:
    name: Backend Validation
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.affected_components, 'backend')
    
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Type Check
        run: npx tsc --noEmit

  # ─── Frontend Validation ────────────────────────────────────────
  frontend-validation:
    name: Frontend Validation
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.affected_components, 'frontend')
    
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Type Check
        run: npx vue-tsc --noEmit

  # ─── Docker Validation ────────────────────────────────────────
  docker-validation:
    name: Docker Images Validation
    runs-on: ubuntu-latest
    needs: 
      - backend-validation
      - frontend-validation
    if: always() && !cancelled()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: whatsauto-backend:validate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: whatsauto-frontend:validate
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security Checks ──────────────────────────────────────────
  security-validation:
    name: Security Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm ci --workspaces

      - name: Audit packages
        run: |
          npm audit --audit-level=moderate --workspaces || true

  # ─── Summary Report ────────────────────────────────────────────
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [backend-validation, frontend-validation, docker-validation, security-validation]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## 📋 Validação Pré-Deploy Concluída" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Resumo" >> $GITHUB_STEP_SUMMARY
          echo "- **Ambiente Alvo:** ${{ github.event.inputs.target_environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Componentes Afetados:** ${{ github.event.inputs.affected_components }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Nível de Risco:** ${{ github.event.inputs.risk_level }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Resultados" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ needs.backend-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.frontend-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker: ${{ needs.docker-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Próximos Passos" >> $GITHUB_STEP_SUMMARY
          echo "Se todos os testes passarem, você pode prosseguir com o deploy para **${{ github.event.inputs.target_environment }}**." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Execute o workflow de deploy manual ou aguarde o push para \`main\` para ativar deploy automático." >> $GITHUB_STEP_SUMMARY

      - name: Check Results
        run: |
          if [ "${{ needs.backend-validation.result }}" = "failure" ] || \
             [ "${{ needs.frontend-validation.result }}" = "failure" ] || \
             [ "${{ needs.docker-validation.result }}" = "failure" ]; then
            echo "❌ Validação falhou! Corrija os erros antes de fazer deploy."
            exit 1
          fi
          
          echo "✅ Todas as validações passaram!"
          exit 0
