# ═══════════════════════════════════════════════════════════════
# Norte MT Sistemas - Release Pipeline
# Create Release on Version Tag
# ═══════════════════════════════════════════════════════════════

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── Create GitHub Release ────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        uses: metcalfc/changelog-generator@v4.0.0
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## 🚀 Release ${{ steps.get_version.outputs.VERSION }}
            
            ### 📝 Changelog
            ${{ steps.changelog.outputs.changelog }}
            
            ### 📦 Docker Images
            - Backend: `ghcr.io/${{ github.repository }}-backend:${{ steps.get_version.outputs.VERSION }}`
            - Frontend: `ghcr.io/${{ github.repository }}-frontend:${{ steps.get_version.outputs.VERSION }}`
            
            ### 🚀 Deploy
            This release has been automatically deployed to production.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}