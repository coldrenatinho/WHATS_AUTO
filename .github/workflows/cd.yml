# ═══════════════════════════════════════════════════════════════
# Norte MT Sistemas - CD Pipeline
# Deploy to Production
# ═══════════════════════════════════════════════════════════════

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-frontend

jobs:
  # ─── Build & Push Docker Images ───────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      backend_image: ${{ steps.meta-backend.outputs.tags }}
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend
      - name: Extract metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend
      - name: Extract metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Server ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://nortemtsistemas.com.br
    
    outputs:
      deployment_id: ${{ steps.deploy.outputs.deployment_id }}
      previous_commit: ${{ steps.deploy.outputs.previous_commit }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save Previous Commit
        id: deploy
        run: |
          echo "deployment_id=$(date +%s)" >> $GITHUB_OUTPUT
          echo "previous_commit=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Deploy to Server
        id: deploy_step
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/whatsauto
            
            # Backup current state for rollback
            docker compose ps > /tmp/compose_state_before.txt
            git rev-parse HEAD > /tmp/commit_before.txt
            
            # Pull latest images
            docker compose pull
            
            # Restart services
            docker compose up -d --remove-orphans
            
            # Clean up old images
            docker image prune -f
            
            # Wait for services to be ready
            sleep 15

      - name: Run Smoke Tests
        id: smoke_tests
        run: |
          chmod +x .github/scripts/smoke-tests.sh
          .github/scripts/smoke-tests.sh "https://api.nortemtsistemas.com.br"

      - name: Notify Success on Slack
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Deploy para Produção Bem-sucedido",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Deploy para Produção Bem-sucedido*\n*Commit:* ${{ github.sha }}\n*Branch:* main\n*URL:* https://nortemtsistemas.com.br\n*Status:* Todos os smoke tests passaram ✓"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "Ver Deploy"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "Abrir Aplicação"
                      },
                      "url": "https://nortemtsistemas.com.br"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Rollback on Failure
        if: failure() && steps.deploy_step.outcome == 'success'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/whatsauto
            
            echo "🔄 Iniciando rollback automático..."
            
            # Revert to previous image state
            docker compose down
            docker compose pull
            git checkout $(cat /tmp/commit_before.txt)
            docker compose up -d --remove-orphans
            
            # Verify rollback
            sleep 15
            if curl -f https://api.nortemtsistemas.com.br/health > /dev/null 2>&1; then
              echo "✅ Rollback concluído com sucesso"
              exit 0
            else
              echo "❌ Falha no rollback"
              exit 1
            fi

      - name: Notify Failure on Slack
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Deploy para Produção Falhou",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Deploy para Produção Falhou*\n*Commit:* ${{ github.sha }}\n*Branch:* main\n*Status:* Rollback automático foi acionado"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Motivo da Falha:*\n${{ job.status }}\n\nVerifique os logs para mais detalhes."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "Ver Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}