services:
  # ─── n8n ────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_bot
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - NODE_ENV=production
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      # Permite usar better-sqlite3 nos Code nodes
      - NODE_FUNCTION_ALLOW_EXTERNAL=better-sqlite3
      # Variáveis do bot (acessíveis via $env.NOME no n8n)
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EVOLUTION_SERVER_URL=${EVOLUTION_SERVER_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
      - HUMAN_PHONE=${HUMAN_PHONE}
      - BUSINESS_NAME=${BUSINESS_NAME}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./bot_data:/data        # SQLite do bot fica aqui
    networks:
      - bot_network

  # ─── Evolution API (WhatsApp) ────────────────────────────────────
  evolution:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8080}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - CACHE_REDIS_ENABLED=false
      - LOG_LEVEL=ERROR
      - LOG_COLOR=true
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
      # Eventos que disparam webhook para o n8n
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      # Todos os outros eventos desligados
      - WEBHOOK_EVENTS_MESSAGES_SET=false
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=false
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=false
      - WEBHOOK_EVENTS_CHATS_UPSERT=false
      - WEBHOOK_EVENTS_GROUPS_UPSERT=false
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - bot_network
    depends_on:
      postgres:
        condition: service_healthy

  # ─── PostgreSQL (para Evolution API) ────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres_bot
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  n8n_data:
  evolution_data:
  postgres_data:

networks:
  bot_network:
    driver: bridge
