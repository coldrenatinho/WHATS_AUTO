  # ═══════════════════════════════════════════════════════════════
  # NORTE MT SISTEMAS - WhatsApp Chatbot Multi-Tenant
  # Repositório: https://nortemtsistemas.com.br/
  # ═══════════════════════════════════════════════════════════════

  # ─── Backend API (Node.js + Express) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsauto_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://nortemtsistemas.com.br,https://api.nortemtsistemas.com.br,https://n8n.nortemtsistemas.com.br,https://evolution.nortemtsistemas.com.br}
      - DB_SYNC_ON_STARTUP=${DB_SYNC_ON_STARTUP:-false}
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-whatsauto}
      - DB_USER=${DB_USER:-whatsauto}
      - DB_PASS=${DB_PASS:-whatsauto123}
      - JWT_SECRET=${JWT_SECRET}
      - EVOLUTION_SERVER_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - REVOLUTION_API_MODE=${REVOLUTION_API_MODE:-mock}
      - REVOLUTION_API_URL=${REVOLUTION_API_URL:-}
      - REVOLUTION_API_KEY=${REVOLUTION_API_KEY:-}
      - REVOLUTION_ENDPOINT_LIST=${REVOLUTION_ENDPOINT_LIST:-/instance/fetchInstances}
      - REVOLUTION_ENDPOINT_CREATE=${REVOLUTION_ENDPOINT_CREATE:-/instance/create}
      - REVOLUTION_ENDPOINT_CONNECT=${REVOLUTION_ENDPOINT_CONNECT:-/instance/connect/{instanceName}}
      - REVOLUTION_ENDPOINT_DISCONNECT=${REVOLUTION_ENDPOINT_DISCONNECT:-/instance/logout/{instanceName}}
      - REVOLUTION_ENDPOINT_STATUS=${REVOLUTION_ENDPOINT_STATUS:-/instance/connectionState/{instanceName}}
      - REVOLUTION_ENDPOINT_QRCODE=${REVOLUTION_ENDPOINT_QRCODE:-/instance/connect/{instanceName}}
      - REVOLUTION_ENDPOINT_SEND_TEXT=${REVOLUTION_ENDPOINT_SEND_TEXT:-/message/sendText/{instanceName}}
      - N8N_WEBHOOK_URL=http://n8n:5678
      - BUSINESS_NAME=${BUSINESS_NAME}
      - COMPANY_SUBDOMAIN=${COMPANY_SUBDOMAIN:-norte}
      - HUMAN_PHONE=${HUMAN_PHONE}
      - ADMIN_NAME=${ADMIN_NAME:-Administrador}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_RESET_PASSWORD=${ADMIN_RESET_PASSWORD:-false}
    networks:
      - bot_network
      - traefik-public
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.backend.rule=Host(`api.${ROOT_DOMAIN:-nortemtsistemas.com.br}`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls=true
      - traefik.http.routers.backend.tls.certresolver=myresolver
      - traefik.http.services.backend.loadbalancer.server.port=3000

  # ─── Frontend (Vue.js + Tailwind CSS) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatsauto_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${API_URL:-https://api.nortemtsistemas.com.br}
    networks:
      - bot_network
      - traefik-public
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.frontend.rule=Host(`${ROOT_DOMAIN:-nortemtsistemas.com.br}`, `chat.${ROOT_DOMAIN:-nortemtsistemas.com.br}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls=true
      - traefik.http.routers.frontend.tls.certresolver=myresolver
      - traefik.http.services.frontend.loadbalancer.server.port=80

  # ─── n8n (Automação) ────────────────────────────────────────────
  # n8n:
  #   image: n8nio/n8n:latest
  #   container_name: n8n_bot
  #   restart: unless-stopped
  #   environment:
  #     - N8N_BASIC_AUTH_ACTIVE=true
  #     - N8N_BASIC_AUTH_USER=${N8N_USER}
  #     - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
  #     - N8N_HOST=${N8N_HOST:-n8n.nortemtsistemas.com.br}
  #     - N8N_PORT=5678
  #     - N8N_PROTOCOL=https
  #     - WEBHOOK_URL=${WEBHOOK_URL:-https://n8n.nortemtsistemas.com.br}
  #     - NODE_ENV=production
  #     - GENERIC_TIMEZONE=America/Sao_Paulo
  #     - TZ=America/Sao_Paulo
  #     - NODE_FUNCTION_ALLOW_EXTERNAL=better-sqlite3
  #     - GEMINI_API_KEY=${GEMINI_API_KEY}
  #     - EVOLUTION_SERVER_URL=http://evolution:8080
  #     - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
  #     - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
  #     - HUMAN_PHONE=${HUMAN_PHONE}
  #     - BUSINESS_NAME=${BUSINESS_NAME}
  #     - BACKEND_URL=http://backend:3000
  #   volumes:
  #     - n8n_data:/home/node/.n8n
  #     - ./bot_data:/data
  #   networks:
  #     - bot_network
  #   depends_on:
  #     - backend
  #   labels:
  #     - traefik.enable=true
  #     - traefik.http.routers.n8n.rule=Host(`n8n.${ROOT_DOMAIN:-nortemtsistemas.com.br}`)
  #     - traefik.http.routers.n8n.entrypoints=websecure
  #     - traefik.http.routers.n8n.tls=true
  #     - traefik.http.routers.n8n.tls.certresolver=le
  #     - traefik.http.services.n8n.loadbalancer.server.port=5678

  # ─── Evolution API (WhatsApp) ────────────────────────────────────
  evolution:
    image: atendai/evolution-api:v2.3.7
    container_name: evolution_api
    restart: unless-stopped
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - SERVER_URL=${EVOLUTION_SERVER_URL:-https://evolution.nortemtsistemas.com.br}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - WEBSOCKET_ENABLED=true
      - WEBSOCKET_GLOBAL_EVENTS=true
      - WEBSOCKET_EVENTS_QRCODE_UPDATED=true
      - WEBSOCKET_EVENTS_CONNECTION_UPDATE=true
      - CACHE_REDIS_ENABLED=false
      - LOG_LEVEL=DEBUG
      - LOG_BAILEYS=debug
      - CONFIG_SESSION_PHONE_VERSION=
      - LOG_COLOR=true
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_SET=false
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=false
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=false
      - WEBHOOK_EVENTS_CHATS_UPSERT=false
      - WEBHOOK_EVENTS_GROUPS_UPSERT=false
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - bot_network
      - traefik-public
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.evolution.rule=Host(`evolution.${ROOT_DOMAIN:-nortemtsistemas.com.br}`)
      - traefik.http.routers.evolution.entrypoints=websecure
      - traefik.http.routers.evolution.tls=true
      - traefik.http.routers.evolution.tls.certresolver=myresolver
      - traefik.http.services.evolution.loadbalancer.server.port=8080

  # ─── MariaDB (Banco Principal) ──────────────────────────────────
  mariadb:
    image: mariadb:11.4
    container_name: whatsauto_mariadb
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS:-root_super_secret}
      - MYSQL_DATABASE=${DB_NAME:-whatsauto}
      - MYSQL_USER=${DB_USER:-whatsauto}
      - MYSQL_PASSWORD=${DB_PASS:-whatsauto123}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - bot_network
    healthcheck:
      test: ["CMD", "mariadb", "-u${DB_USER:-whatsauto}", "-p${DB_PASS:-whatsauto123}", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── PostgreSQL (para Evolution API) ────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres_bot
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Cache opcional) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: whatsauto_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - bot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  # n8n_data:
  evolution_data:
  postgres_data:
  mariadb_data:
  redis_data:
  # traefik_letsencrypt:

networks:
  bot_network:
    driver: bridge
  traefik-public:
    external: true
