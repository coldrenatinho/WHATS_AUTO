  # ═══════════════════════════════════════════════════════════════
  # NORTE MT SISTEMAS - WhatsApp Chatbot Multi-Tenant
  # Repositório: https://nortemtsistemas.com.br/
  # ═══════════════════════════════════════════════════════════════

services:

  # ─── Backend API (Node.js + Express) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsauto_backend
    restart: unless-stopped
    init: true
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SKIP_MIGRATIONS=${SKIP_MIGRATIONS:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://nortemtsistemas.com.br,https://chat.nortemtsistemas.com.br,https://api.nortemtsistemas.com.br,https://n8n.nortemtsistemas.com.br,https://evolution.nortemtsistemas.com.br}
      - DB_SYNC_ON_STARTUP=${DB_SYNC_ON_STARTUP:-false}
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-whatsauto}
      - DB_USER=${DB_USER:-whatsauto}
      - DB_PASS=${DB_PASS}
      - JWT_SECRET=${JWT_SECRET}
      - EVOLUTION_SERVER_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - REVOLUTION_API_MODE=${REVOLUTION_API_MODE:-mock}
      - REVOLUTION_API_URL=${REVOLUTION_API_URL:-}
      - REVOLUTION_API_KEY=${REVOLUTION_API_KEY:-}
      - REVOLUTION_ENDPOINT_LIST=${REVOLUTION_ENDPOINT_LIST:-/instance/fetchInstances}
      - REVOLUTION_ENDPOINT_CREATE=${REVOLUTION_ENDPOINT_CREATE:-/instance/create}
      - REVOLUTION_ENDPOINT_CONNECT=${REVOLUTION_ENDPOINT_CONNECT:-/instance/connect/{instanceName}}
      - REVOLUTION_ENDPOINT_DISCONNECT=${REVOLUTION_ENDPOINT_DISCONNECT:-/instance/logout/{instanceName}}
      - REVOLUTION_ENDPOINT_STATUS=${REVOLUTION_ENDPOINT_STATUS:-/instance/connectionState/{instanceName}}
      - REVOLUTION_ENDPOINT_QRCODE=${REVOLUTION_ENDPOINT_QRCODE:-/instance/connect/{instanceName}}
      - REVOLUTION_ENDPOINT_SEND_TEXT=${REVOLUTION_ENDPOINT_SEND_TEXT:-/message/sendText/{instanceName}}
      - N8N_WEBHOOK_URL=http://n8n:5678
      - BUSINESS_NAME=${BUSINESS_NAME}
      - COMPANY_SUBDOMAIN=${COMPANY_SUBDOMAIN:-norte}
      - HUMAN_PHONE=${HUMAN_PHONE}
      - ADMIN_NAME=${ADMIN_NAME:-Administrador}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_RESET_PASSWORD=${ADMIN_RESET_PASSWORD:-false}
    networks:
      - traefik-public
      - bot_network
    security_opt:
      - no-new-privileges:true
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.backend-api-chat.rule=Host(`api.${ROOT_DOMAIN:-nortemtsistemas.com.br}`)
      - traefik.http.routers.backend-api-chat.entrypoints=websecure
      - traefik.http.routers.backend-api-chat.tls=true
      - traefik.http.routers.backend-api-chat.tls.certresolver=myresolver
      - traefik.http.services.backend-api-chat.loadbalancer.server.port=3000

  # ─── Frontend (Vue.js + Tailwind CSS) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatsauto_frontend
    restart: unless-stopped
    init: true
    environment:
      - VITE_API_URL=${API_URL:-https://api.nortemtsistemas.com.br}
      - VITE_SOCKET_URL=${SOCKET_URL:-https://api.${ROOT_DOMAIN:-nortemtsistemas.com.br}}
      - VITE_SOCKET_PATH=${SOCKET_PATH:-/socket.io}
      - VITE_TYPEBOT_BUILDER_URL=${TYPEBOT_BUILDER_URL:-https://typebot-builder.${ROOT_DOMAIN:-nortemtsistemas.com.br}}
    networks:
      - traefik-public
      - bot_network
    security_opt:
      - no-new-privileges:true
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.frontend-chat.rule=Host(`chat.${ROOT_DOMAIN:-nortemtsistemas.com.br}`)"
      - "traefik.http.routers.frontend-chat.entrypoints=websecure"
      - "traefik.http.routers.frontend-chat.tls=true"
      - "traefik.http.routers.frontend-chat.tls.certresolver=myresolver"
      - "traefik.http.routers.frontend-chat.service=frontend-chat"
      - "traefik.http.services.frontend-chat.loadbalancer.server.port=80"

  evolution:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: unless-stopped
    init: true
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - SERVER_URL=${EVOLUTION_SERVER_URL:-https://evolution.nortemtsistemas.com.br}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=postgresql
      # - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_bot:5432/${POSTGRES_DB:-evolution}
      - WEBSOCKET_ENABLED=true
      - WEBSOCKET_GLOBAL_EVENTS=true
      - WEBSOCKET_EVENTS_QRCODE_UPDATED=true
      - WEBSOCKET_EVENTS_CONNECTION_UPDATE=true
      - CACHE_REDIS_ENABLED=false
      - LOG_LEVEL=WARN
      - LOG_BAILEYS=error
      - CONFIG_SESSION_PHONE_VERSION=
      - LOG_COLOR=true
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_SET=false
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=false
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=false
      - WEBHOOK_EVENTS_CHATS_UPSERT=false
      - WEBHOOK_EVENTS_GROUPS_UPSERT=false
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - traefik-public
      - bot_network
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.evolution.rule=Host(`evolution.${ROOT_DOMAIN:-nortemtsistemas.com.br}`)
      - traefik.http.routers.evolution.entrypoints=websecure
      - traefik.http.routers.evolution.tls=true
      - traefik.http.routers.evolution.tls.certresolver=myresolver
      - traefik.http.services.evolution.loadbalancer.server.port=8080

  # ─── MariaDB (Banco Principal) ──────────────────────────────────
  mariadb:
    image: mariadb:11.4
    container_name: whatsauto_mariadb
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
      - MYSQL_DATABASE=${DB_NAME:-whatsauto}
      - MYSQL_USER=${DB_USER:-whatsauto}
      - MYSQL_PASSWORD=${DB_PASS}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - bot_network
      - traefik-public
    healthcheck:
      test: ["CMD", "mariadb", "-u${DB_USER:-whatsauto}", "-p${DB_PASS}", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── PostgreSQL (para Evolution API) ────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres_bot
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bot_network
      - traefik-public
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Cache opcional) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: whatsauto_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - traefik-public
      - bot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Typebot Builder (Construtor Visual) ────────────────────────
  typebot-builder:
    profiles: ["typebot"]
    image: baptistearno/typebot-builder:latest
    container_name: typebot_builder
    restart: unless-stopped
    environment:
      - ENCRYPTION_SECRET=${TYPEBOT_ENCRYPTION_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_bot:5432/${POSTGRES_DB}?schema=typebot
      - NEXT_PUBLIC_VIEWER_URL=${TYPEBOT_VIEWER_URL:-https://typebot-viewer.${ROOT_DOMAIN:-nortemtsistemas.com.br}}
      - NEXTAUTH_URL=${TYPEBOT_BUILDER_URL:-https://typebot-builder.${ROOT_DOMAIN:-nortemtsistemas.com.br}}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    networks:
      - traefik-public
      - bot_network
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.typebot-builder.rule=Host(`typebot-builder.${ROOT_DOMAIN:-nortemtsistemas.com.br}`)"
      - "traefik.http.routers.typebot-builder.entrypoints=websecure"
      - "traefik.http.routers.typebot-builder.tls=true"
      - "traefik.http.routers.typebot-builder.tls.certresolver=myresolver"
      - "traefik.http.services.typebot-builder.loadbalancer.server.port=3000"

  # ─── Typebot Viewer (Motor de Chat) ─────────────────────────────
  typebot-viewer:
    profiles: ["typebot"]
    image: baptistearno/typebot-viewer:latest
    container_name: typebot_viewer
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_bot:5432/${POSTGRES_DB}?schema=typebot
      - NEXT_PUBLIC_VIEWER_URL=${TYPEBOT_VIEWER_URL:-https://typebot-viewer.${ROOT_DOMAIN:-nortemtsistemas.com.br}}
    networks:
      - traefik-public
      - bot_network
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.typebot-viewer.rule=Host(`typebot-viewer.${ROOT_DOMAIN:-nortemtsistemas.com.br}`)"
      - "traefik.http.routers.typebot-viewer.entrypoints=websecure"
      - "traefik.http.routers.typebot-viewer.tls=true"
      - "traefik.http.routers.typebot-viewer.tls.certresolver=myresolver"
      - "traefik.http.services.typebot-viewer.loadbalancer.server.port=3000"

volumes:
  evolution_data:
  postgres_data:
  mariadb_data:
  redis_data:
  n8n_data:

networks:
  traefik-public:
    external: true
  bot_network:
    driver: bridge
